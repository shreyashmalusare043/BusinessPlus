[build]
  command = "pnpm build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# --- HI NAVIN RULE ADD KARA ---
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API redirects 
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# --- SPA Redirect 
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# --- HSTS आणि SECURITY HEADERS 
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "upgrade-insecure-requests"